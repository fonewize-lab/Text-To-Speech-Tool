<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - NovaTTS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 40px;
      background: #0f0f1a;
      border-bottom: 1px solid #1e1e3a;
    }
    .logo { font-size: 1.4rem; font-weight: 700; color: #a78bfa; text-decoration: none; }
    .center {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .card {
      background: #0f0f1a;
      border: 1px solid #1e1e3a;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }
    h1 { font-size: 1.8rem; margin-bottom: 8px; }
    .subtitle { color: #888; margin-bottom: 30px; font-size: 0.95rem; }
    .field { margin-bottom: 18px; }
    label { display: block; color: #aaa; font-size: 0.85rem; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 13px 16px;
      background: #0a0a0f;
      border: 1px solid #1e1e3a;
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: border 0.3s;
    }
    input:focus { border-color: #a78bfa; }
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #a78bfa, #7c3aed);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.3s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg {
      text-align: center;
      margin-top: 14px;
      font-size: 0.9rem;
      padding: 10px;
      border-radius: 8px;
      display: none;
    }
    .msg.error { background: #2a0a0a; color: #f87171; display: block; }
    .msg.success { background: #0a2a0a; color: #4ade80; display: block; }
    .bottom-link {
      text-align: center;
      margin-top: 20px;
      color: #888;
      font-size: 0.9rem;
    }
    .bottom-link a { color: #a78bfa; text-decoration: none; }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="logo">🎙️ NovaTTS</a>
  </nav>

  <div class="center">
    <div class="card">
      <h1>Welcome Back</h1>
      <p class="subtitle">Login to access your NovaTTS account</p>

      <div class="field">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com">
      </div>

      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••">
      </div>

      <button class="btn" id="loginBtn" onclick="handleLogin()">
        Login
      </button>

      <div class="msg" id="msg"></div>

      <div class="bottom-link">
        Don't have an account? <a href="signup.html">Sign Up Free</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const { createClient } = supabase;
    const client = createClient(
      'https://xscnufncpnbekwhscfzr.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzY251Zm5jcG5iZWt3aHNjZnpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNzI3NDYsImV4cCI6MjA5Mjg0ODc0Nn0.BbVkdRsKK8o9pvroW-RJAxVg_o45SFxPl1PxqD3HL9U'
    );

    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const msg = document.getElementById('msg');

      if (!email || !password) {
        msg.className = 'msg error';
        msg.textContent = '⚠️ Please fill all fields!';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Logging in...';
      msg.className = 'msg';

      const { error } = await client.auth.signInWithPassword({ email, password });

      if (error) {
        msg.className = 'msg error';
        msg.textContent = '❌ ' + error.message;
        btn.disabled = false;
        btn.textContent = 'Login';
      } else {
        msg.className = 'msg success';
        msg.textContent = '✅ Login successful! Redirecting...';
        setTimeout(() => window.location.href = 'index.html', 1500);
      }
    }
  </script>

</body>
</html>
